spring:
  application:
    name: payment-gateway-app
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_gateway
    username: gateway
    password: change-me
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

bank:
  base-url: http://localhost:8787